name: CI/CD Pipeline - CarbonTrack

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

env:
  JAVA_VERSION: '21'
  DOCKER_IMAGE: carbontrack

jobs:

  # ================================================
  # JOB 1: BUILD E TESTES
  # ================================================
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: carbontrack_test
          MYSQL_USER: carbontrack
          MYSQL_PASSWORD: carbon123
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compilar o projeto
        run: mvn clean compile -B

      - name: Executar testes automatizados
        run: mvn test -B -Dmaven.test.failure.ignore=true
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/carbontrack_test?useSSL=false&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: carbontrack
          SPRING_DATASOURCE_PASSWORD: carbon123

      
      - name: Gerar artefato JAR
        run: mvn package -DskipTests -B

      - name: Upload do JAR
        uses: actions/upload-artifact@v4
        with:
          name: carbontrack-jar
          path: target/*.jar
          retention-days: 5

  # ================================================
  # JOB 2: BUILD DA IMAGEM DOCKER
  # ================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extrair metadata da imagem
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build e push da imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ================================================
  # JOB 3: DEPLOY EM STAGING
  # Triggered em push para: develop ou main
  # ================================================
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: docker-build
    environment: staging
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy em Staging via Docker Compose
        run: |
          echo "🚀 Iniciando deploy em STAGING..."
          docker compose \
            -f docker-compose.yml \
            up -d --build
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.STAGING_DB_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.STAGING_DB_NAME }}
          MYSQL_USER: ${{ secrets.STAGING_DB_USER }}
          MYSQL_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          SPRING_PROFILES_ACTIVE: staging
          APP_PORT: 8080

      - name: Aguardar aplicação subir
        run: |
          echo "⏳ Aguardando a aplicação ficar disponível..."
          sleep 30

      - name: Health check em Staging
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            http://localhost:8080/actuator/health \
            && echo "✅ Staging está saudável!" \
            || (echo "❌ Health check falhou!" && exit 1)

      - name: Notificação de sucesso - Staging
        if: success()
        run: echo "✅ Deploy em STAGING concluído com sucesso!"

  # ================================================
  # JOB 4: DEPLOY EM PRODUÇÃO
  # Triggered APENAS em push para: main
  # ================================================
  deploy-production:
    name: Deploy Produção
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Deploy em Produção via Docker Compose
        run: |
          echo "🚀 Iniciando deploy em PRODUÇÃO..."
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            up -d --no-build
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.PROD_DB_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.PROD_DB_NAME }}
          MYSQL_USER: ${{ secrets.PROD_DB_USER }}
          MYSQL_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/carbontrack
          IMAGE_TAG: latest
          SPRING_PROFILES_ACTIVE: production
          APP_PORT: 80

      - name: Health check em Produção
        run: |
          curl --fail --retry 5 --retry-delay 15 \
            http://localhost/actuator/health \
            && echo "✅ Produção está saudável!" \
            || (echo "❌ Health check falhou em Produção!" && exit 1)

      - name: Notificação de sucesso - Produção
        if: success()
        run: echo "✅ Deploy em PRODUÇÃO concluído com sucesso!"
